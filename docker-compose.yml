# Déploiement Coolify — auto-deploy depuis la branche main
# Variables d'environnement : gérées uniquement dans l'UI Coolify (pas de lock compose)
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - reeltok-data:/app/data
    expose:
      - "8000"
    environment:
      PORT: "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://backend:8000
    expose:
      - "3000"
    depends_on:
      - backend

volumes:
  reeltok-data:
