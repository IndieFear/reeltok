services:
  backend:
    build: .
    restart: unless-stopped
    volumes:
      - reeltok-data:/app/data
    expose:
      - "8000"
    environment:
      PORT: "8000"
      CAROUSEL_RENDER_CONCURRENCY: ${CAROUSEL_RENDER_CONCURRENCY:-1}
      PUBLIC_URL: ${DASHBOARD_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      RUNWARE_API_KEY: ${RUNWARE_API_KEY}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN}
      UPLOAD_POST_API_KEY: ${UPLOAD_POST_API_KEY}
      UPLOAD_POST_USER: ${UPLOAD_POST_USER}
      FONT_SCALE: ${FONT_SCALE:-1.0}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  dashboard:
    build:
      context: ./dashboard
      args:
        NEXT_PUBLIC_API_URL: ${API_URL}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  reeltok-data:
